<script src="scripts/works-data.js?v=17"></script>
<script>
// ── Mobile Menu ──
const menuToggle = document.getElementById('menu-toggle');
const menuClose = document.getElementById('menu-close');
const mobileMenu = document.getElementById('mobile-menu');
menuToggle.addEventListener('click', () => {
  mobileMenu.classList.remove('opacity-0', 'pointer-events-none');
  mobileMenu.classList.add('opacity-100', 'pointer-events-auto');
  document.body.style.overflow = 'hidden';
});
menuClose.addEventListener('click', () => {
  mobileMenu.classList.add('opacity-0', 'pointer-events-none');
  mobileMenu.classList.remove('opacity-100', 'pointer-events-auto');
  document.body.style.overflow = '';
});

// ── Find work by ID ──
function findWork(id) {
  // Search in exhibitions
  for (const exh of WORKS_DATA.exhibitions) {
    if (exh.works) {
      const w = exh.works.find(w => w.id === id);
      if (w) return { work: w, exhibition: exh };
    }
  }
  // Search in public art
  const pa = WORKS_DATA.publicArt.find(w => w.id === id);
  if (pa) return { work: pa, exhibition: null };
  // Search in VR projects
  if (WORKS_DATA.vrProjects) {
    const vr = WORKS_DATA.vrProjects.find(w => w.id === id);
    if (vr) return { work: vr, exhibition: null };
  }
  return null;
}

// ── Render Detail ──
const params = new URLSearchParams(window.location.search);
const workId = params.get('id');
const detailMain = document.getElementById('detail-main');

if (!workId) {
  window.location.href = 'works.html';
} else {
  const result = findWork(workId);
  if (!result) {
    detailMain.innerHTML = `
      <div class="px-[15%] py-40 text-center">
        <h1 class="font-headline italic text-4xl text-primary mb-8">Work Not Found</h1>
        <a href="works.html" class="font-label text-sm text-primary underline">Back to Gallery</a>
      </div>`;
  } else {
    const { work, exhibition } = result;
    const isPublicArt = work.location !== undefined;
    const images = Array.isArray(work.images) ? work.images : [work.images];
    const categoryLabel = isPublicArt ? 'PUBLIC ART' : (work.category === 'digital-art' ? 'DIGITAL ART' : 'SCULPTURE');

    // Update page title & dynamic SEO meta
    document.title = `${work.title} — 박성하 조각가 | ${categoryLabel === 'PUBLIC ART' ? '공공미술' : categoryLabel === 'DIGITAL ART' ? '디지털 아트' : '조각'}`;
    const baseUrl = 'https://art-psh.com';
    const pageUrl = `${baseUrl}/work-detail.html?id=${workId}`;
    const imgUrl = `${baseUrl}/images/${images[0]}`;
    const desc = work.description ? work.description.slice(0, 120) : `${work.title} — 박성하 조각가의 ${categoryLabel === 'PUBLIC ART' ? '공공미술' : '조각'} 작품`;

    // Canonical
    const canon = document.createElement('link');
    canon.rel = 'canonical'; canon.href = pageUrl;
    document.head.appendChild(canon);

    // OG tags
    const ogTags = {
      'og:url': pageUrl, 'og:title': document.title,
      'og:description': desc, 'og:image': imgUrl
    };
    Object.entries(ogTags).forEach(([p, c]) => {
      let m = document.querySelector(`meta[property="${p}"]`);
      if (!m) { m = document.createElement('meta'); m.setAttribute('property', p); document.head.appendChild(m); }
      m.setAttribute('content', c);
    });
    // Twitter tags
    const twTags = { 'twitter:title': document.title, 'twitter:description': desc, 'twitter:image': imgUrl };
    Object.entries(twTags).forEach(([n, c]) => {
      let m = document.querySelector(`meta[name="${n}"]`);
      if (!m) { m = document.createElement('meta'); m.setAttribute('name', n); document.head.appendChild(m); }
      m.setAttribute('content', c);
    });
    // JSON-LD
    const jsonLd = {
      '@context': 'https://schema.org', '@type': 'VisualArtwork',
      'name': work.titleEn || work.title, 'alternateName': work.title,
      'artist': { '@type': 'Person', 'name': '박성하', 'alternateName': 'Park Seong-Ha', 'url': baseUrl },
      'image': imgUrl, 'url': pageUrl,
      'dateCreated': work.year,
      'artMedium': work.material || '',
      'artform': isPublicArt ? '공공미술' : (work.category === 'digital-art' ? '디지털 아트' : '조각'),
      'keywords': '박성하, 박성하 조각가, 공공미술, 건축물 미술작품, 미술장식품, 조각, 곰인형 조각, 석조 조각'
    };
    if (work.description) jsonLd.description = work.description;
    if (work.size) jsonLd.size = work.size;
    if (work.location) jsonLd.contentLocation = { '@type': 'Place', 'name': work.location };
    const ldScript = document.createElement('script');
    ldScript.type = 'application/ld+json';
    ldScript.textContent = JSON.stringify(jsonLd);
    document.head.appendChild(ldScript);

    // Build compact metadata line
    const metaParts = [];
    if (work.material) metaParts.push(work.material);
    if (work.size) metaParts.push(work.size);
    if (work.location) metaParts.push(work.location);
    metaParts.push(work.year);
    const metaLine = metaParts.join(' · ');

    let html = `
      <!-- Hero Image -->
      <section class="px-[5%] md:px-[10%] mb-10 md:mb-16 fade-in">
        <div class="relative w-full overflow-hidden bg-surface-container-low flex justify-center">
          <div class="skeleton-hero" id="hero-skeleton"></div>
          <img class="w-full md:max-w-4xl h-auto object-contain hero-img" alt="${work.titleEn || work.title}" src="images/${images[0]}" onload="this.classList.add('loaded'); document.getElementById('hero-skeleton').style.display='none';" onerror="document.getElementById('hero-skeleton').style.display='none'; this.style.display='none';"/>
        </div>
      </section>

      <!-- Title & Info — gallery label style -->
      <section class="px-[8%] md:px-[20%] mb-20 md:mb-32 fade-in">
        <!-- Title block -->
        <div class="mb-6">
          <span class="font-label text-[9px] uppercase tracking-[0.3em] text-on-surface-variant/40 block mb-4">${categoryLabel}</span>
          <h1 class="font-headline italic text-4xl md:text-6xl text-primary leading-[1.1] tracking-tight">${work.titleEn || work.title}</h1>
          ${work.titleEn && work.title !== work.titleEn ? `<p class="font-body text-base md:text-lg text-on-surface-variant/70 mt-3 tracking-wide">${work.title}</p>` : ''}
        </div>

        <!-- Thin rule + metadata row -->
        <div class="border-t border-outline/10 pt-5 flex flex-col md:flex-row md:items-baseline md:justify-between gap-4">
          <p class="font-body text-[11px] text-on-surface-variant/55 tracking-wide leading-relaxed">${metaLine}</p>
          ${exhibition ? `<p class="font-body text-[11px] text-on-surface-variant/40 tracking-wide md:text-right">${exhibition.title}${exhibition.venue ? ' · ' + exhibition.venue : ''}</p>` : ''}
        </div>

        ${work.description ? `
        <!-- Description -->
        <div class="mt-12 md:mt-16 max-w-2xl">
          <p class="font-headline text-lg md:text-xl leading-relaxed text-on-surface/60 italic">"${work.description}"</p>
        </div>` : ''}

        <div class="mt-10 md:mt-14">
          <a href="index.html#contact" class="bg-primary text-on-primary-container px-10 py-3 font-label text-[9px] uppercase tracking-[0.25em] transition-all hover:bg-primary-container no-underline inline-block">Contact</a>
        </div>
      </section>
    `;

    // Additional images
    if (images.length > 1) {
      html += `
        <section class="px-[5%] md:px-[10%] mb-24 md:mb-40 fade-in">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-10">
            ${images.slice(1).map((img, i) => `
              <div class="bg-surface-container-low ${i === 0 && images.length === 2 ? 'md:col-span-2' : ''} flex justify-center">
                <img loading="lazy" class="w-full h-auto object-contain" alt="${work.titleEn || work.title} — Detail ${i+1}" src="images/${img}"/>
              </div>
            `).join('')}
          </div>
        </section>
      `;
    }

    // Back navigation
    html += `
      <section class="px-[15%] py-16 md:py-20 bg-surface-container-low fade-in">
        <div class="flex flex-col items-center gap-6">
          <a class="group flex items-center gap-4 no-underline" href="works.html">
            <span class="material-symbols-outlined text-sm transition-transform group-hover:-translate-x-2">arrow_back</span>
            <span class="font-label text-[10px] uppercase tracking-[0.2em] border-b border-transparent group-hover:border-primary pb-1 text-primary">Back to Gallery</span>
          </a>
        </div>
      </section>
    `;

    detailMain.innerHTML = html;

    // Fade in — first two sections appear immediately, rest on scroll
    const fadeEls = document.querySelectorAll('.fade-in');
    fadeEls.forEach((el, i) => {
      if (i < 2) {
        // Hero + title section: show immediately with slight stagger
        setTimeout(() => el.classList.add('visible'), i * 150);
      }
    });

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.05, rootMargin: '100px 0px 100px 0px' });
    fadeEls.forEach((el, i) => { if (i >= 2) observer.observe(el); });
  }
}
</script>
