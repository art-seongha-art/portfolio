<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>페이지를 찾을 수 없습니다 — Park Seong-Ha</title>
<meta name="robots" content="noindex, nofollow"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Manrope', sans-serif;
    background: #111;
    color: #e0e0e0;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
    padding: 2rem;
  }
  .container { max-width: 480px; }
  h1 { font-size: 6rem; font-weight: 200; color: #555; margin-bottom: 0.5rem; }
  p { font-size: 1rem; line-height: 1.6; margin-bottom: 1.5rem; color: #999; }
  a {
    display: inline-block;
    padding: 0.75rem 2rem;
    border: 1px solid #444;
    color: #e0e0e0;
    text-decoration: none;
    font-size: 0.875rem;
    letter-spacing: 0.1em;
    transition: all 0.3s;
  }
  a:hover { background: #e0e0e0; color: #111; }
  .redirect-msg { font-size: 0.75rem; color: #666; margin-top: 1rem; }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet"/>
<script>
  // 3초 후 메인 페이지로 자동 리다이렉트
  setTimeout(function() {
    window.location.href = '/';
  }, 3000);
</script>
</head>
<body>
<div class="container">
  <h1>404</h1>
  <p>요청하신 페이지를 찾을 수 없습니다.<br/>사이트가 새롭게 리뉴얼되었습니다.</p>
  <a href="/">포트폴리오 메인으로 이동</a>
  <p class="redirect-msg">3초 후 자동으로 메인 페이지로 이동합니다.</p>
</div>
</body>
</html>
