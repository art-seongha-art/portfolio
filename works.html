<script>
// ── Mobile Menu ──────────────────────────────────────────
const menuToggle = document.getElementById('menu-toggle');
const menuClose = document.getElementById('menu-close');
const mobileMenu = document.getElementById('mobile-menu');
menuToggle.addEventListener('click', () => {
  mobileMenu.classList.remove('opacity-0', 'pointer-events-none');
  mobileMenu.classList.add('opacity-100', 'pointer-events-auto');
  document.body.style.overflow = 'hidden';
});
menuClose.addEventListener('click', () => {
  mobileMenu.classList.add('opacity-0', 'pointer-events-none');
  mobileMenu.classList.remove('opacity-100', 'pointer-events-auto');
  document.body.style.overflow = '';
});
mobileMenu.querySelectorAll('a').forEach(l => l.addEventListener('click', () => {
  mobileMenu.classList.add('opacity-0', 'pointer-events-none');
  mobileMenu.classList.remove('opacity-100', 'pointer-events-auto');
  document.body.style.overflow = '';
}));

// ── Collect works by category ────────────────────────────
function collectByCategory(cat) {
  const all = [];
  WORKS_DATA.exhibitions.forEach(exh => {
    if (exh.works) {
      exh.works.forEach(w => {
        const wCat = w.category || exh.category;
        if (wCat === cat) {
          all.push({ ...w, category: wCat, year: w.year || exh.year, exhibition: exh.title });
        }
      });
    }
  });
  all.sort((a, b) => (parseInt(b.year)||0) - (parseInt(a.year)||0));
  return all;
}

const sculptureWorks = collectByCategory('sculpture');
const digitalArtWorks = collectByCategory('digital-art');
const vrWorks = (WORKS_DATA.vrProjects || []).sort((a, b) => (parseInt(b.year)||0) - (parseInt(a.year)||0));
const publicArtWorks = [...WORKS_DATA.publicArt].sort((a, b) => (parseInt(b.year)||0) - (parseInt(a.year)||0));

// ── Render Masonry ───────────────────────────────────────
const masonry = document.getElementById('masonry');

function renderCard(work, cat) {
  const mainImg = Array.isArray(work.images) ? work.images[0] : work.images;
  const title = work.titleEn || work.title;
  const titleKo = work.title || '';
  const material = work.material || '';
  const location = work.location || '';
  const yr = String(work.year).substring(0, 4);

  const subParts = [];
  if (title !== titleKo) subParts.push(title);
  if (material) subParts.push(material);
  if (work.size) subParts.push(work.size);
  if (location) subParts.push(location);
  subParts.push(yr);
  const subLine = subParts.join(' · ');

  // Generate SEO-optimized alt text with all required keywords
  let altText = '박성하 작품 — ' + titleKo;
  let titleAttr = titleKo + ' — 박성하 미술작품';

  if (cat === 'sculpture') {
    // Sculpture: 박성하 조각가 석조각 테디베어 미술작품 조형물 — [title], [material] 석재 봉합 조각
    altText = '박성하 조각가 석조각 테디베어 미술작품 조형물 — ' + titleKo;
    if (material) {
      altText += ', ' + material + ' 석재 봉합 조각';
    } else {
      altText += ', 석재 봉합 조각';
    }
    titleAttr = titleKo + ' — 박성하 석조 조각';
  } else if (cat === 'public-art') {
    // Public Art: 박성하 조각가 공공미술 미술작품 조형물 건축물 미술장식품 — [title], [location] 석조각
    altText = '박성하 조각가 공공미술 미술작품 조형물 건축물 미술장식품 — ' + titleKo;
    if (location) {
      altText += ', ' + location;
    }
    altText += ' 석조각';
    titleAttr = titleKo + ' — 박성하 공공미술';
  } else if (cat === 'digital-art') {
    // Digital Art: 박성하 조각가 인공지능 생성형 인공지능 미술작품 — [title], 석조각 디지털 아트
    altText = '박성하 조각가 인공지능 생성형 인공지능 미술작품 — ' + titleKo + ', 석조각 디지털 아트';
    titleAttr = titleKo + ' — 박성하 AI 아트';
  } else if (cat === 'vr') {
    // VR/AR: 박성하 조각가 인공지능 생성형 인공지능 미술작품 — [title], VR 실감미디어 석조각
    altText = '박성하 조각가 인공지능 생성형 인공지능 미술작품 — ' + titleKo + ', VR 실감미디어 석조각';
    titleAttr = titleKo + ' — 박성하 VR 미디어아트';
  }

  return `
    <div class="masonry-card" data-category="${cat}">
      <a href="work-detail.html?id=${work.id}" class="card-img-wrap" style="display:block; text-decoration:none;">
        <img loading="lazy" alt="${altText}" title="${titleAttr}" src="images/${mainImg}" onerror="this.closest('.masonry-card').style.display='none'"/>
        <div class="card-overlay">
          <span style="color:#fff; font-size:11px; font-weight:300; letter-spacing:0.15em; text-transform:uppercase;">자세히 보기</span>
        </div>
      </a>
      <div style="padding:10px 0 0; text-align:right;">
        <p style="font-size:13px; color:#1a1c1c; margin:0; font-weight:400;">${titleKo}</p>
        <p style="font-size:9px; color:#999; letter-spacing:0.04em; margin-top:3px; line-height:1.5;">${subLine}</p>
      </div>
    </div>
  `;
}

function sectionHeader(title, subtitle) {
  return `
    <div class="section-header" style="grid-column:1/-1; margin:56px 0 20px 0; padding-bottom:10px; border-bottom:1px solid rgba(0,0,0,0.06);">
      <div style="display:flex; align-items:baseline; gap:16px;">
        <span class="font-headline italic text-2xl md:text-3xl text-primary">${title}</span>
        ${subtitle ? `<span style="font-size:11px; color:#999; letter-spacing:0.15em; text-transform:uppercase;">${subtitle}</span>` : ''}
      </div>
    </div>
  `;
}

function renderMasonry(filter) {
  let html = '';
  const isAll = filter === 'all';

  // ── 1. Sculpture ──
  if (isAll || filter === 'sculpture') {
    if (isAll && sculptureWorks.length > 0) html += sectionHeader('Sculpture', '');
    sculptureWorks.forEach(w => { html += renderCard(w, 'sculpture'); });
  }

  // ── 2. Digital Art ──
  if (isAll || filter === 'digital-art') {
    if (isAll && digitalArtWorks.length > 0) html += sectionHeader('Digital Art', `AI Generated · 2025`);
    digitalArtWorks.forEach(w => { html += renderCard(w, 'digital-art'); });
  }

  // ── 3. VR/AR ──
  if (isAll || filter === 'vr') {
    if (isAll && vrWorks.length > 0) html += sectionHeader('VR / AR', '');
    vrWorks.forEach(w => { html += renderCard(w, 'vr'); });
  }

  // ── 4. Public Art ──
  if (isAll || filter === 'public-art') {
    if (isAll && publicArtWorks.length > 0) html += sectionHeader('Public Art', `전국 ${publicArtWorks.length}곳 설치 · 2014–2024`);
    publicArtWorks.forEach(w => { html += renderCard({...w, category: 'public-art'}, 'public-art'); });
  }

  masonry.innerHTML = html;

  // Staggered fade-in — show cards earlier and faster
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const delay = Math.random() * 100;
        setTimeout(() => entry.target.classList.add('visible'), delay);
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.01, rootMargin: '200px 0px 200px 0px' });

  masonry.querySelectorAll('.masonry-card').forEach(el => observer.observe(el));
}

renderMasonry('all');

// ── Filter ───────────────────────────────────────────────
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active', 'text-primary'));
    btn.classList.add('active', 'text-primary');
    renderMasonry(btn.dataset.filter);
  });
});

// ── Lightbox ─────────────────────────────────────────────
function openLightbox(src, title, sub) {
  document.getElementById('lb-img').src = src;
  document.getElementById('lb-caption').textContent = title;
  document.getElementById('lb-sub').textContent = sub;
  document.getElementById('lightbox').classList.add('active');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
  document.body.style.overflow = '';
}
document.getElementById('lightbox').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeLightbox();
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeLightbox();
});
</script>
</body></html>
